name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

jobs:
  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run package
      - name: 创建发行版并上传 VSIX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then prerelease="--prerelease"; fi
          gh release create "$GITHUB_REF_NAME" ./*.vsix --generate-notes $prerelease --title "言序 VS Code $GITHUB_REF_NAME"
